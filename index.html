<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pwnana</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --screen-bg: #020503;
    --screen-panel: #050906;
    --phosphor: #7dff95;
    --phosphor-bright: #caffd0;
    --phosphor-dim: #7fb989;
    --amber: #d8d36d;
  }

  body {
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(125, 255, 149, 0.06) 0,
        rgba(125, 255, 149, 0.06) 1px,
        transparent 1px,
        transparent 4px
      ),
      var(--screen-bg);
    color: var(--phosphor-bright);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Courier New', monospace;
    height: 100vh;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  html, body { height: 100%; overflow: hidden; }

  header {
    padding: 0.85rem 1.25rem;
    background: var(--screen-panel);
    border-bottom: 1px solid rgba(125, 255, 149, 0.22);
    box-shadow: inset 0 -1px 0 rgba(202, 255, 208, 0.07);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  h1 {
    font-size: 1.2rem;
    color: var(--phosphor-bright);
    letter-spacing: 0.08em;
    text-shadow: 0 0 0.35rem rgba(125, 255, 149, 0.7);
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    min-width: 0;
  }

  label { font-size: 0.85rem; color: var(--phosphor-dim); display: flex; align-items: center; gap: 0.4rem; }

  input[type=number] {
    background: #020703;
    border: 1px solid rgba(125, 255, 149, 0.28);
    color: var(--phosphor-bright);
    border-radius: 4px;
    padding: 0.25rem 0.5rem;
    width: 4.5rem;
    font-family: inherit;
    font-size: 0.85rem;
    box-shadow: inset 0 0 0.6rem rgba(125, 255, 149, 0.08);
  }

  input[type=checkbox] { accent-color: var(--phosphor); width: 1em; height: 1em; }

  button {
    background: #0d3f1b;
    color: var(--phosphor-bright);
    border: 1px solid rgba(125, 255, 149, 0.38);
    border-radius: 4px;
    padding: 0.35rem 1rem;
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    text-shadow: 0 0 0.35rem rgba(125, 255, 149, 0.7);
    box-shadow: inset 0 0 0.7rem rgba(125, 255, 149, 0.08);
    transition: background 0.15s, border-color 0.15s;
    flex: 0 0 auto;
  }
  button:hover { background: #145c28; border-color: rgba(202, 255, 208, 0.7); }

  #toast {
    position: fixed;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: var(--phosphor);
    color: #031005;
    padding: 0.4rem 1rem;
    border-radius: 4px;
    font-size: 0.85rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #toast.show { opacity: 1; }

  #grid {
    --pw-column-width: 22ch;
    --pw-font-size: 1.2rem;
    flex: 1;
    min-height: 0;
    padding: 0.75rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1.6rem;
    align-content: start;
    align-items: flex-start;
    font-size: var(--pw-font-size);
  }

  .pw {
    font-size: inherit;
    line-height: 1.1;
    font-weight: bold;
    color: var(--phosphor);
    cursor: pointer;
    padding: 0.1rem 0.38rem;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
    flex: 1 1 var(--pw-column-width);
    max-width: 100%;
    text-shadow:
      0 0 0.25rem rgba(125, 255, 149, 0.85),
      0 0 0.9rem rgba(125, 255, 149, 0.28);
    transition: background 0.1s, color 0.1s;
    user-select: none;
  }
  .pw:hover { background: rgba(125, 255, 149, 0.08); color: var(--phosphor-bright); }
  .pw.copied { background: rgba(125, 255, 149, 0.16); color: #ffffff; }
  .pw-hint {
    font-size: 0.7em;
    font-weight: normal;
    color: var(--amber);
    margin-top: 0.1em;
    text-shadow: 0 0 0.35rem rgba(216, 211, 109, 0.5);
  }

  @media (max-width: 700px) {
    header {
      padding: 0.55rem 1rem;
      gap: 1rem;
      flex-wrap: nowrap;
    }

    .controls {
      flex: 1 1 auto;
      flex-wrap: nowrap;
      gap: 0.65rem;
      overflow: hidden;
    }

    label { font-size: 0.8rem; }
    input[type=number] { width: 4rem; }
    button {
      width: 2rem;
      height: 1.85rem;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
    }

    button::before {
      content: "↻";
      font-size: 1rem;
      line-height: 1;
    }
  }
</style>
</head>
<body>

<header>
  <h1>pwnana</h1>
  <div class="controls">
    <label>length <input type="number" id="len" value="16" min="8" max="64"></label>
    <label><input type="checkbox" id="digit">     digit</label>
    <label><input type="checkbox" id="symbol">    symbol</label>
    <label><input type="checkbox" id="goroawase"> 語呂</label>
    <button id="gen">Generate</button>
  </div>
</header>

<div id="grid"></div>
<div id="toast">Copied!</div>

<script>
const LAYOUT = {
  lc: [...'wrtsfgzxcvbq'],
  lv: [...'ea'],
  rc: [...'yphjklnm'],
  rv: [...'uio'],
};
const DIGRAPHS = ['oo','ee','ii','ou','ai','au'];
const LEET = { i:'!', a:'@', s:'$', e:'3', o:'0', t:'7', q:'9', b:'6', g:'8' };
const BANNED_UPPERCASE = new Set(['O', 'I']);
let GOROAWASE = [];

const pick = a => a[Math.random() * a.length | 0];

function unit(hand) {
  const { lc, lv, rc, rv } = LAYOUT;
  if (hand === 'left')
    return Math.random() < 0.5 ? [pick(rv) + pick(lc), 'left'] : [pick(rc) + pick(lv), 'left'];
  else
    return Math.random() < 0.5 ? [pick(lv) + pick(rc), 'right'] : [pick(lc) + pick(rv), 'right'];
}

function applyLeet(arr, wantDigit) {
  const pred = wantDigit ? c => /\d/.test(c) : c => !/\d/.test(c);
  const cands = arr.reduce((a, c, i) => (LEET[c] && pred(LEET[c]) ? [...a, i] : a), []);
  if (!cands.length) return false;
  const i = pick(cands);
  arr[i] = LEET[arr[i]];
  return true;
}

function applyDefaultRules(arr) {
  for (let i = 0; i < arr.length; i++) {
    if (BANNED_UPPERCASE.has(arr[i])) arr[i] = arr[i].toLowerCase();
  }
}

function isConsonant(ch) {
  return /[a-z]/i.test(ch) && !/[aeiou]/i.test(ch);
}

function fixedPositions(length) {
  const arr = [];
  for (let i = 3; i < length - 1; i += 4) {
    if (i >= 1 && i <= length - 2) arr.push(i);
  }
  return arr.length ? arr : [Math.max(1, Math.floor(length / 2))];
}

function fixedGoroStartPositions(length) {
  const arr = [];
  for (let i = 0; i < length - 3; i += 4) arr.push(i);
  return arr.length ? arr : [0];
}

function generate(length, digit, symbol, goroawase) {
  const chunks = [];
  let hand = Math.random() < 0.5 ? 'left' : 'right';
  while (chunks.reduce((s, c) => s + c.length, 0) < length) {
    if (Math.random() < 0.2) {
      chunks.push(pick(DIGRAPHS));
    } else {
      const [u, h] = unit(hand);
      chunks.push(u);
      hand = h;
    }
  }
  const res = [...chunks.join('').slice(0, length)];
  let hint = null;
  const usedPositions = new Set();
  const insertionPositions = fixedPositions(length);

  if (goroawase && GOROAWASE.length > 0) {
    const [label, digits] = pick(GOROAWASE);
    const pos = pick(fixedGoroStartPositions(length));
    for (let i = 0; i < digits.length && pos + i < length; i++) {
      res[pos + i] = digits[i];
      usedPositions.add(pos + i);
    }
    hint = label;
  } else if (digit && !applyLeet(res, true)) {
    const cands = insertionPositions.filter(i => !usedPositions.has(i));
    const pos = pick(cands.length ? cands : insertionPositions);
    res[pos] = String(Math.random() * 10 | 0);
    usedPositions.add(pos);
  }

  if (symbol && !applyLeet(res, false)) {
    const syms = Object.values(LEET).filter(v => !/\d/.test(v));
    const cands = insertionPositions.filter(i => !usedPositions.has(i));
    const pos = pick(cands.length ? cands : insertionPositions);
    res[pos] = pick(syms);
  }
  if (isConsonant(res[res.length - 1]) && res[res.length - 1].toLowerCase() !== 'n') {
    res[res.length - 1] = pick([...LAYOUT.lv, ...LAYOUT.rv]);
  }
  applyDefaultRules(res);
  return [res.join(''), hint];
}

let toastTimer;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1200);
}

function gridContentBox(grid) {
  const style = getComputedStyle(grid);
  const width = grid.clientWidth
    - (parseFloat(style.paddingLeft) || 0)
    - (parseFloat(style.paddingRight) || 0);
  const height = grid.clientHeight
    - (parseFloat(style.paddingTop) || 0)
    - (parseFloat(style.paddingBottom) || 0);
  return [Math.max(0, width), Math.max(0, height), style];
}

function syncGridHeight(grid) {
  const headerBottom = document.querySelector('header').getBoundingClientRect().bottom;
  grid.style.height = `${Math.max(0, window.innerHeight - Math.ceil(headerBottom))}px`;
}

function fitGridMetrics(grid, length, goroawase) {
  const [contentWidth] = gridContentBox(grid);
  const maxFont = length > 32 ? 17 : 20;
  const fitFont = Math.floor((contentWidth - 16) / Math.max(1, length) / 0.62);
  const fontSize = Math.max(11, Math.min(maxFont, fitFont));
  grid.style.setProperty('--pw-font-size', `${fontSize}px`);

  const probe = document.createElement('div');
  probe.className = 'pw';
  probe.style.visibility = 'hidden';
  probe.style.position = 'absolute';
  probe.style.width = 'max-content';

  const text = document.createElement('div');
  text.textContent = 'w'.repeat(length);
  probe.appendChild(text);
  if (goroawase) {
    const hint = document.createElement('div');
    hint.className = 'pw-hint';
    hint.textContent = '語呂';
    probe.appendChild(hint);
  }

  grid.appendChild(probe);
  const itemRect = probe.getBoundingClientRect();
  probe.remove();

  const width = Math.ceil(itemRect.width + 2);
  const height = Math.ceil(itemRect.height);
  grid.style.setProperty('--pw-column-width', `${width}px`);
  return [width, height];
}

function countThatFits(length, goroawase) {
  const grid = document.getElementById('grid');
  syncGridHeight(grid);
  const [itemWidth, itemHeight] = fitGridMetrics(grid, length, goroawase);
  const [contentWidth, contentHeight, style] = gridContentBox(grid);
  const colGap   = parseFloat(style.columnGap) || 0;
  const rowGap   = parseFloat(style.rowGap)    || 0;
  const cols     = Math.max(1, Math.floor((contentWidth + colGap) / (itemWidth + colGap)));
  const rows     = Math.max(1, Math.floor((contentHeight + rowGap) / (itemHeight + rowGap)));

  const raw = Math.max(2, cols * rows);
  return raw % 2 === 0 ? raw : Math.max(2, raw - 1);
}

function makeItem(pw, hint) {
  const el = document.createElement('div');
  el.className = 'pw';
  el.title = 'click to copy';
  const text = document.createElement('div');
  text.textContent = pw;
  el.appendChild(text);
  if (hint) {
    const h = document.createElement('div');
    h.className = 'pw-hint';
    h.textContent = hint;
    el.appendChild(h);
  }
  el.addEventListener('click', () => {
    navigator.clipboard.writeText(pw).then(() => {
      el.classList.add('copied');
      setTimeout(() => el.classList.remove('copied'), 800);
      showToast();
    });
  });
  return el;
}

function render() {
  const length    = Math.max(8, parseInt(document.getElementById('len').value) || 16);
  const digit     = document.getElementById('digit').checked;
  const symbol    = document.getElementById('symbol').checked;
  const goroawase = document.getElementById('goroawase').checked;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const count = countThatFits(length, goroawase);
  const frag  = document.createDocumentFragment();
  for (let i = 0; i < count; i++) {
    const [pw, hint] = generate(length, digit, symbol, goroawase);
    frag.appendChild(makeItem(pw, hint));
  }
  grid.appendChild(frag);
}

async function loadGoroawase() {
  const res = await fetch('./goroawase.json', { cache: 'no-cache' });
  if (!res.ok) throw new Error(`Failed to load goroawase.json: ${res.status}`);
  const all = await res.json();
  GOROAWASE = all.filter(([, digits]) => digits.length === 4);
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 150);
});

document.getElementById('gen').addEventListener('click', render);
document.querySelectorAll('#len, #digit, #symbol, #goroawase').forEach((control) => {
  control.addEventListener('input', render);
  control.addEventListener('change', render);
});
loadGoroawase()
  .then(render)
  .catch((err) => {
    console.error(err);
    document.getElementById('goroawase').checked = false;
    document.getElementById('goroawase').disabled = true;
    render();
  });
</script>
</body>
</html>
